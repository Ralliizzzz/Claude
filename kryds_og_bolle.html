<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kryds og Bolle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin-top: 1.8rem;
      font-size: 1.1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
    }

    .score-box span {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
    }

    .score-box.x-score span { color: #e94560; }
    .score-box.o-score span { color: #a8dadc; }
    .score-box.draw-score span { color: #aaa; }

    #reset-btn {
      margin-top: 1.8rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #reset-btn:hover {
      background: #c73652;
      transform: scale(1.04);
    }
  </style>
</head>
<body>

  <h1>Kryds & Bolle</h1>
  <div id="status">X begynder!</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="scoreboard">
    <div class="score-box x-score">X<span id="score-x">0</span></div>
    <div class="score-box draw-score">Uafgjort<span id="score-draw">0</span></div>
    <div class="score-box o-score">O<span id="score-o">0</span></div>
  </div>

  <button id="reset-btn">Ny runde</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      scores = scores || { X: 0, O: 0, draw: 0 };
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus(`${current} begynder!`);
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-draw').textContent = scores.draw;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    document.querySelectorAll('.cell').forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i]) return;

        board[i] = current;
        cell.textContent = current === 'X' ? '✕' : '○';
        cell.classList.add(current.toLowerCase(), 'taken');

        const win = checkWinner();
        if (win) {
          win.forEach(idx => document.querySelector(`[data-i="${idx}"]`).classList.add('win'));
          setStatus(`${current} vinder! 🎉`);
          scores[current]++;
          updateScores();
          gameOver = true;
        } else if (board.every(Boolean)) {
          setStatus('Uafgjort! 🤝');
          scores.draw++;
          updateScores();
          gameOver = true;
        } else {
          current = current === 'X' ? 'O' : 'X';
          setStatus(`${current}'s tur`);
        }
      });
    });

    document.getElementById('reset-btn').addEventListener('click', init);

    init();
  </script>
</body>
</html>
