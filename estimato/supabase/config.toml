[auth]
site_url = "https://estimato.dk"
additional_redirect_urls = ["https://estimato.dk/auth/callback", "https://estimato-xi.vercel.app/auth/callback"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
